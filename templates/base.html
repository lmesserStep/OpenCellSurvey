<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}OpenCellSurvey{% endblock %}</title>
  <link rel="stylesheet" href="/static/vendor/bootstrap.min.css">
  <link rel="stylesheet" href="/static/vendor/bootstrap-icons.min.css">
  <link rel="stylesheet" href="/static/css/main.css">
  {% block head %}{% endblock %}
</head>
<body>
<div class="app-wrapper">

  <!-- ─── Sidebar ─────────────────────────────────────────────────────────── -->
  <nav class="sidebar">
    <div class="sidebar-brand">
      <i class="bi bi-broadcast-pin"></i>
      <span>OpenCellSurvey</span>
    </div>

    <ul class="sidebar-nav">
      <li class="{{ 'active' if page == 'dashboard' }}">
        <a href="/"><i class="bi bi-speedometer2"></i> <span>Dashboard</span></a>
      </li>
      <li class="{{ 'active' if page == 'survey' }}">
        <a href="/survey"><i class="bi bi-radar"></i> <span>Survey Config</span></a>
      </li>
      <li class="{{ 'active' if page == 'map' }}">
        <a href="/map"><i class="bi bi-map"></i> <span>Survey</span></a>
      </li>
      <li class="{{ 'active' if page == 'towers' }}">
        <a href="/towers"><i class="bi bi-broadcast"></i> <span>Towers</span></a>
      </li>
      <li class="{{ 'active' if page == 'exports' }}">
        <a href="/exports"><i class="bi bi-file-earmark-arrow-down"></i> <span>Exports</span></a>
      </li>
      <li class="{{ 'active' if page == 'settings' }}">
        <a href="/settings"><i class="bi bi-gear"></i> <span>Settings</span></a>
      </li>
      <li class="{{ 'active' if page == 'logs' }}">
        <a href="/logs"><i class="bi bi-terminal"></i> <span>Logs</span></a>
      </li>
        <hr class="mx-3 my-0">
        <nav class="nav flex-column px-2 py-2">
            <a class="nav-link" href="#" onclick="window.location.href='http://'+window.location.hostname+':8000/select'">
                <i class="bi bi-grid"></i> App Selector
            </a>
        </nav>
    </ul>

    <div class="sidebar-footer">
      <div class="status-indicator" id="ws-status">
        <span class="dot dot-grey"></span>
        <span>Connecting…</span>
      </div>
    </div>
  </nav>

  <!-- ─── Main content ─────────────────────────────────────────────────────── -->
  <div class="main-content">
    <div class="topbar">
      <div class="topbar-left">
        <h4 class="page-title">{% block page_title %}{% endblock %}</h4>
      </div>
      <div class="topbar-right d-flex align-items-center gap-3">
        <span class="survey-badge" id="survey-status-badge">
          <i class="bi bi-circle-fill text-secondary"></i> Idle
        </span>
      </div>
    </div>

    <div class="content-area">
      {% block content %}{% endblock %}
    </div>
  </div>

</div><!-- /app-wrapper -->

<script src="/static/vendor/bootstrap.bundle.min.js"></script>
<script src="/static/js/websocket.js"></script>
<script src="/static/js/app.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
